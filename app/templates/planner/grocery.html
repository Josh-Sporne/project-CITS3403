{% extends "base.html" %}
{% block title %}Grocery List — Plate Theory{% endblock %}

{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between mb-2 gap-2">
    <h2 class="mb-0"><i class="bi bi-cart3 text-mint"></i> Grocery List</h2>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-light" id="copyBtn">
            <i class="bi bi-clipboard"></i> Copy
        </button>
        <button class="btn btn-sm btn-outline-light" id="printBtn">
            <i class="bi bi-printer"></i> Print
        </button>
    </div>
</div>

<div class="hero-pill mb-3">Auto-generated from your meal plan</div>

<div class="btn-group mb-4" role="group" aria-label="Range toggle">
    <button type="button" class="btn btn-sm btn-outline-light range-btn active" data-range="week">Week</button>
    <button type="button" class="btn btn-sm btn-outline-light range-btn" data-range="day">Day</button>
</div>

<div class="card mb-4">
    <div class="card-body">
        <div id="grocery-list">
            <p class="text-muted-custom" style="font-size:.82rem">Loading…</p>
        </div>
    </div>
</div>

<div class="card mb-4" id="excludedCard" style="display:none">
    <div class="card-header">
        <i class="bi bi-box-seam text-sun"></i> Excluded by Pantry
        <span class="badge bg-secondary ms-1" id="excludedCount">0</span>
    </div>
    <div class="card-body">
        <div id="excluded-list"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    const CSRF = document.querySelector('meta[name="csrf-token"]')?.content || '';
    const listEl = document.getElementById('grocery-list');
    const excludedListEl = document.getElementById('excluded-list');
    const excludedCard = document.getElementById('excludedCard');
    const excludedCountEl = document.getElementById('excludedCount');
    let currentRange = 'week';

    function fetchGrocery() {
        listEl.innerHTML = '<p class="text-muted-custom" style="font-size:.82rem">Loading…</p>';
        fetch('/api/grocery-list?range=' + currentRange, {
            headers: { 'X-CSRFToken': CSRF }
        })
            .then(r => r.json())
            .then(data => {
                const needed = data.items.filter(i => !i.in_pantry);
                const excluded = data.items.filter(i => i.in_pantry);

                if (needed.length === 0) {
                    listEl.innerHTML = '<p class="text-muted-custom" style="font-size:.85rem">No ingredients needed — add meals to your planner first.</p>';
                } else {
                    listEl.innerHTML = needed.map((item, i) => `
                        <div class="form-check mb-2 grocery-row">
                            <input class="form-check-input" type="checkbox" id="gi-${i}">
                            <label class="form-check-label" for="gi-${i}" style="font-size:.85rem">
                                <span class="grocery-name">${item.name}</span>
                                ${item.quantity ? `<span class="text-muted-custom ms-1" style="font-size:.75rem">${item.quantity} ${item.unit}</span>` : ''}
                            </label>
                        </div>
                    `).join('');
                }

                if (excluded.length > 0) {
                    excludedCard.style.display = '';
                    excludedCountEl.textContent = excluded.length;
                    excludedListEl.innerHTML = excluded.map(item => `
                        <div class="d-flex align-items-center gap-2 mb-1" style="font-size:.82rem">
                            <i class="bi bi-check-circle-fill text-mint"></i>
                            <span>${item.name}</span>
                            ${item.quantity ? `<span class="text-muted-custom" style="font-size:.72rem">${item.quantity} ${item.unit}</span>` : ''}
                        </div>
                    `).join('');
                } else {
                    excludedCard.style.display = 'none';
                }
            })
            .catch(() => {
                listEl.innerHTML = '<p class="text-coral" style="font-size:.85rem">Failed to load grocery list.</p>';
            });
    }

    document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentRange = this.dataset.range;
            fetchGrocery();
        });
    });

    listEl.addEventListener('change', function (e) {
        if (e.target.type === 'checkbox') {
            const row = e.target.closest('.grocery-row');
            if (row) {
                row.style.textDecoration = e.target.checked ? 'line-through' : 'none';
                row.style.opacity = e.target.checked ? '0.5' : '1';
            }
        }
    });

    document.getElementById('copyBtn').addEventListener('click', function () {
        const rows = listEl.querySelectorAll('.grocery-name');
        const text = Array.from(rows).map(el => '- ' + el.textContent.trim()).join('\n');
        navigator.clipboard.writeText(text || 'No items')
            .then(() => {
                this.innerHTML = '<i class="bi bi-check2"></i> Copied!';
                setTimeout(() => { this.innerHTML = '<i class="bi bi-clipboard"></i> Copy'; }, 1500);
            })
            .catch(() => {
                this.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Copy failed';
                setTimeout(() => { this.innerHTML = '<i class="bi bi-clipboard"></i> Copy'; }, 2000);
            });
    });

    document.getElementById('printBtn').addEventListener('click', function () {
        window.print();
    });

    fetchGrocery();
})();
</script>
{% endblock %}
